spring:
  application:
    name: smart-budget-api
  datasource:
    url: jdbc:postgresql://localhost:5432/smartbudget
    username: smartbudget
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:8080"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

jwt:
  secret: ThisIsASecretKeyThatIsAtLeastSixtyFourCharactersLongToSatisfyTheHS512AlgorithmRequirement1234567890
  expiration: 86400000
  refresh-expiration: 604800000

server:
  port: 8080
  servlet:
    context-path: /api/v1