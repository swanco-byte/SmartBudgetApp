spring:
  application:
    name: smart-budget-api
  datasource:
    url: jdbc:postgresql://localhost:5432/smartbudget
    username: smartbudget
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: your-secret-key-here-change-in-production
  expiration: 86400000

server:
  port: 8080
  servlet:
    context-path: /api/v1